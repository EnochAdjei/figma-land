<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Figma Land</title>
  </head>
  <body>
    <header>
      <nav class="nav collapsible">
        <div class="container nav__container">
          <a href="#"
            ><img
              src="images/logo.png"
              alt="figma land logo - image"
              class="logo"
          /></a>
          <div class="nav-links">
            <a href="#" class="btn btn--outline nav__btn">Sign Up</a>
            <svg class="icon humburger">
              <use xlink:href="images/icons/sprite.svg#menu"></use>
            </svg>
          </div>
          <ul class="list nav__list collapsible__content">
            <li class="list__item"><a href="#">Home</a></li>
            <li class="list__item"><a href="#">Product</a></li>
            <li class="list__item"><a href="#">About</a></li>
            <li class="list__item"><a href="#">Contact</a></li>
          </ul>
        </div>
      </nav>
      <div class="block hero">
        <div class="container">
          <h1 class="hero__heading">Find the Best Solution in Seconds</h1>
          <p class="hero__tag">
            If debugging is the process of removing software bugs.
          </p>
          <div class="cta-btns">
            <a href="#" class="btn btn--white btn--stretched">get started</a
            ><a href="#" class="btn btn--outline btn--stretched"
              >try for free</a
            >
          </div>
          <img
            src="images/dashboard.png"
            alt="dashboard showcase - image"
            class="hero__image"
          />
        </div>
      </div>
    </header>
    <main></main>
    <footer></footer>

    <script src="js/main.js"></script>
  </body>
</html>
